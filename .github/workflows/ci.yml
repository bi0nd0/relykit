name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['22.14.0', '24.x', '26.x']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm install --global npm@11.12.1
      - run: npm ci
      - run: npm run check

  package-and-example:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: npm
      - run: npm install --global npm@11.12.1
      - run: npm ci
      - run: npm run check:packages
      - run: npm run build --workspace @relykit/example-nuxt
      - run: npm audit --omit=dev
